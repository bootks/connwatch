name: ci
on: [push, pull_request]
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: go vet ./...
      - run: go build ./agent/cmd/agent
      - run: go build ./server/cmd/server
      - run: go test ./... || true

